<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация - Dika Knit</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --primary: #6c5ce7;
            --secondary: #00b894;
            --dark: #0a0a1a;
            --text: #ffffff;
            --text-light: rgba(255,255,255,0.6);
            --text-muted: rgba(255,255,255,0.3);
            --glass: rgba(255,255,255,0.03);
            --glass-border: rgba(255,255,255,0.06);
            --gradient: linear-gradient(135deg, #6c5ce7, #a29bfe, #fd79a8);
            --gradient-primary: linear-gradient(135deg, #6c5ce7, #a29bfe);
        }

        html, body {
            height: 100%;
            font-family: 'Inter', sans-serif;
            background: var(--dark);
            color: var(--text);
            overflow: hidden;
        }

        /* ФОН как на главной */
        .bg {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            z-index: 0;
            background: var(--dark);
            overflow: hidden;
        }

        .bg-gradient {
            position: absolute;
            width: 100%; height: 100%;
            background: 
                radial-gradient(ellipse at 20% 50%, rgba(108,92,231,0.12) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 50%, rgba(0,184,148,0.08) 0%, transparent 60%),
                radial-gradient(ellipse at 50% 80%, rgba(253,121,168,0.06) 0%, transparent 50%);
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.3;
            animation: orbFloat 20s ease-in-out infinite alternate;
        }
        .orb-1 { width: 600px; height: 600px; background: rgba(108,92,231,0.15); top: -200px; left: -200px; }
        .orb-2 { width: 500px; height: 500px; background: rgba(0,184,148,0.10); bottom: -150px; right: -150px; animation-delay: -7s; }
        .orb-3 { width: 400px; height: 400px; background: rgba(253,121,168,0.08); top: 50%; left: 50%; transform: translate(-50%,-50%); animation-delay: -14s; }

        @keyframes orbFloat {
            0% { transform: translate(0,0) scale(1); }
            33% { transform: translate(60px,-40px) scale(1.1); }
            66% { transform: translate(-40px,30px) scale(0.9); }
            100% { transform: translate(30px,-20px) scale(1.05); }
        }

        .bg-grid {
            position: absolute;
            width: 100%; height: 100%;
            background-image: 
                linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
            background-size: 80px 80px;
            opacity: 0.5;
        }

        .stars {
            position: absolute;
            width: 100%; height: 100%;
        }
        .star {
            position: absolute;
            width: 2px; height: 2px;
            background: white;
            border-radius: 50%;
            animation: starTwinkle 3s ease-in-out infinite alternate;
        }
        @keyframes starTwinkle {
            0% { opacity: 0.2; transform: scale(0.8); }
            100% { opacity: 1; transform: scale(1.2); }
        }

        /* НАВИГАЦИЯ */
        .navbar {
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 100;
            padding: 1rem 2.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(10,10,26,0.6);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .nav-logo {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            font-size: 1.2rem;
            font-weight: 700;
            color: white;
            text-decoration: none;
        }
        .nav-logo .highlight {
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }

        .nav-link {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            transition: 0.3s;
        }
        .nav-link:hover { color: white; }

        .nav-btn {
            padding: 0.5rem 1.8rem;
            border-radius: 50px;
            background: var(--gradient-primary);
            color: white !important;
            font-weight: 600;
            box-shadow: 0 4px 20px rgba(108,92,231,0.25);
            transition: 0.3s;
        }
        .nav-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(108,92,231,0.4);
        }

        /* СТРАНИЦА РЕГИСТРАЦИИ */
        .page-wrapper {
            position: relative;
            z-index: 1;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 6rem 1.5rem 2rem;
        }

        .auth-card {
            max-width: 420px;
            width: 100%;
            padding: 2.5rem;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 24px;
            backdrop-filter: blur(20px);
            animation: fadeUp 0.8s ease;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .auth-card .icon { font-size: 3rem; display: block; text-align: center; margin-bottom: 0.5rem; }
        .auth-card h1 { text-align: center; font-size: 1.8rem; font-weight: 700; margin-bottom: 0.3rem; }
        .auth-card .subtitle { text-align: center; color: var(--text-muted); font-size: 0.9rem; margin-bottom: 2rem; }

        .error-message {
            background: rgba(255,107,107,0.1);
            border: 1px solid rgba(255,107,107,0.2);
            color: #ff6b6b;
            padding: 0.8rem 1rem;
            border-radius: 10px;
            font-size: 0.9rem;
            display: none;
            margin-bottom: 1rem;
        }
        .error-message.show { display: block; }

        .form-group { margin-bottom: 1.2rem; }
        .form-group label { display: block; font-size: 0.85rem; font-weight: 500; color: var(--text-light); margin-bottom: 0.4rem; }
        .form-group input {
            width: 100%;
            padding: 0.8rem 1rem;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.08);
            background: rgba(255,255,255,0.03);
            color: white;
            font-size: 0.95rem;
            transition: 0.3s;
        }
        .form-group input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(108,92,231,0.15);
        }
        .form-group input::placeholder { color: var(--text-muted); }

        .password-hint {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 0.3rem;
        }

        .btn-submit {
            width: 100%;
            padding: 0.9rem;
            border-radius: 10px;
            border: none;
            background: var(--gradient-primary);
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 4px 25px rgba(108,92,231,0.3);
        }
        .btn-submit:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 40px rgba(108,92,231,0.5);
        }
        .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; }

        .auth-footer {
            text-align: center;
            margin-top: 1.5rem;
            color: var(--text-muted);
            font-size: 0.9rem;
        }
        .auth-footer a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
            transition: 0.3s;
        }
        .auth-footer a:hover { color: #a29bfe; }

        .auth-divider {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin: 1.5rem 0;
            color: var(--text-muted);
            font-size: 0.8rem;
        }
        .auth-divider::before,
        .auth-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(255,255,255,0.06);
        }

        @media (max-width: 768px) {
            .navbar { padding: 0.8rem 1rem; }
            .nav-links { gap: 0.8rem; }
            .nav-link { font-size: 0.8rem; }
            .nav-btn { padding: 0.4rem 1rem; font-size: 0.8rem; }
        }
    </style>
</head>
<body>
    <!-- ФОН -->
    <div class="bg">
        <div class="bg-gradient"></div>
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
        <div class="bg-grid"></div>
        <div class="stars" id="stars"></div>
    </div>

    <!-- НАВИГАЦИЯ -->
    <nav class="navbar">
        <a href="/" class="nav-logo">🧶 Dika<span class="highlight">Knit</span></a>
        <div class="nav-links">
            <a href="/" class="nav-link">Главная</a>
            <a href="/tutorial.html" class="nav-link">Обучение</a>
            <a href="/updates.html" class="nav-link">Обновления</a>
            <a href="/login.html" class="nav-link nav-btn">Войти</a>
        </div>
    </nav>

    <!-- СТРАНИЦА РЕГИСТРАЦИИ -->
    <div class="page-wrapper">
        <div class="auth-card">
            <span class="icon">✨</span>
            <h1>Создать аккаунт</h1>
            <p class="subtitle">Присоединяйтесь к Dika Knit</p>

            <div class="error-message" id="errorMessage"></div>

            <form id="registerForm">
                <div class="form-group">
                    <label for="username">Имя пользователя</label>
                    <input type="text" id="username" placeholder="Придумайте логин" required autofocus>
                </div>

                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="Ваш email" required>
                </div>

                <div class="form-group">
                    <label for="password">Пароль</label>
                    <input type="password" id="password" placeholder="Минимум 6 символов" required>
                    <div class="password-hint">Пароль должен содержать минимум 6 символов</div>
                </div>

                <div class="form-group">
                    <label for="confirmPassword">Подтвердите пароль</label>
                    <input type="password" id="confirmPassword" placeholder="Повторите пароль" required>
                </div>

                <button type="submit" class="btn-submit">Зарегистрироваться</button>
            </form>

            <div class="auth-divider">уже есть аккаунт?</div>
            <div class="auth-footer">
                <a href="/login.html">Войти</a>
            </div>
        </div>
    </div>

    <script>
        // Звезды
        (function() {
            const container = document.getElementById('stars');
            for (let i = 0; i < 80; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.animationDelay = Math.random() * 5 + 's';
                star.style.animationDuration = (2 + Math.random() * 3) + 's';
                star.style.width = (1 + Math.random() * 2) + 'px';
                star.style.height = star.style.width;
                container.appendChild(star);
            }
        })();

        // РЕГИСТРАЦИЯ (ИСПРАВЛЕНА)
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value.trim();
            const confirmPassword = document.getElementById('confirmPassword').value.trim();
            const errorEl = document.getElementById('errorMessage');
            const btn = e.target.querySelector('button[type="submit"]');
            
            errorEl.classList.remove('show');
            errorEl.textContent = '';
            
            // Валидация
            if (!username || !email || !password || !confirmPassword) {
                errorEl.textContent = 'Заполните все поля';
                errorEl.classList.add('show');
                return;
            }
            
            if (username.length < 3) {
                errorEl.textContent = 'Имя пользователя минимум 3 символа';
                errorEl.classList.add('show');
                return;
            }
            
            if (!email.includes('@') || !email.includes('.')) {
                errorEl.textContent = 'Введите корректный email';
                errorEl.classList.add('show');
                return;
            }
            
            if (password.length < 6) {
                errorEl.textContent = 'Пароль минимум 6 символов';
                errorEl.classList.add('show');
                return;
            }
            
            if (password !== confirmPassword) {
                errorEl.textContent = 'Пароли не совпадают';
                errorEl.classList.add('show');
                return;
            }
            
            btn.disabled = true;
            btn.textContent = '⏳ Регистрация...';
            
            try {
                const response = await fetch('/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, email, password })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    window.location.href = '/dashboard.html';
                } else {
                    errorEl.textContent = data.error || 'Ошибка регистрации';
                    errorEl.classList.add('show');
                    btn.disabled = false;
                    btn.textContent = 'Зарегистрироваться';
                }
            } catch (error) {
                errorEl.textContent = 'Ошибка соединения с сервером';
                errorEl.classList.add('show');
                btn.disabled = false;
                btn.textContent = 'Зарегистрироваться';
                console.error('Ошибка:', error);
            }
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Обучение - Dika Knit</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --primary: #6c5ce7;
            --secondary: #00b894;
            --dark: #0a0a1a;
            --text: #ffffff;
            --text-light: rgba(255,255,255,0.6);
            --text-muted: rgba(255,255,255,0.3);
            --glass: rgba(255,255,255,0.03);
            --glass-border: rgba(255,255,255,0.06);
            --gradient: linear-gradient(135deg, #6c5ce7, #a29bfe, #fd79a8);
            --gradient-primary: linear-gradient(135deg, #6c5ce7, #a29bfe);
            --gradient-secondary: linear-gradient(135deg, #00b894, #55efc4);
        }

        html, body {
            min-height: 100vh;
            font-family: 'Inter', sans-serif;
            background: var(--dark);
            color: var(--text);
        }

        /* ФОН */
        .bg {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            z-index: 0;
            background: var(--dark);
            overflow: hidden;
        }

        .bg-gradient {
            position: absolute;
            width: 100%; height: 100%;
            background: 
                radial-gradient(ellipse at 20% 50%, rgba(108,92,231,0.12) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 50%, rgba(0,184,148,0.08) 0%, transparent 60%),
                radial-gradient(ellipse at 50% 80%, rgba(253,121,168,0.06) 0%, transparent 50%);
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.3;
            animation: orbFloat 20s ease-in-out infinite alternate;
        }
        .orb-1 { width: 600px; height: 600px; background: rgba(108,92,231,0.15); top: -200px; left: -200px; }
        .orb-2 { width: 500px; height: 500px; background: rgba(0,184,148,0.10); bottom: -150px; right: -150px; animation-delay: -7s; }
        .orb-3 { width: 400px; height: 400px; background: rgba(253,121,168,0.08); top: 50%; left: 50%; transform: translate(-50%,-50%); animation-delay: -14s; }

        @keyframes orbFloat {
            0% { transform: translate(0,0) scale(1); }
            33% { transform: translate(60px,-40px) scale(1.1); }
            66% { transform: translate(-40px,30px) scale(0.9); }
            100% { transform: translate(30px,-20px) scale(1.05); }
        }

        .bg-grid {
            position: absolute;
            width: 100%; height: 100%;
            background-image: 
                linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
            background-size: 80px 80px;
            opacity: 0.5;
        }

        .stars {
            position: absolute;
            width: 100%; height: 100%;
        }
        .star {
            position: absolute;
            width: 2px; height: 2px;
            background: white;
            border-radius: 50%;
            animation: starTwinkle 3s ease-in-out infinite alternate;
        }
        @keyframes starTwinkle {
            0% { opacity: 0.2; transform: scale(0.8); }
            100% { opacity: 1; transform: scale(1.2); }
        }

        .navbar {
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 100;
            padding: 1rem 2.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(10,10,26,0.6);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .nav-logo {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            font-size: 1.2rem;
            font-weight: 700;
            color: white;
            text-decoration: none;
        }
        .nav-logo .highlight {
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }

        .nav-link {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            transition: 0.3s;
            position: relative;
        }
        .nav-link::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--gradient);
            transition: width 0.3s;
            border-radius: 2px;
        }
        .nav-link:hover { color: white; }
        .nav-link:hover::after { width: 100%; }
        .nav-link.active { color: white; }
        .nav-link.active::after { width: 100%; }

        .nav-btn {
            padding: 0.5rem 1.8rem;
            border-radius: 50px;
            background: var(--gradient-primary);
            color: white !important;
            font-weight: 600;
            box-shadow: 0 4px 20px rgba(108,92,231,0.25);
            transition: 0.3s;
        }
        .nav-btn::after { display: none; }
        .nav-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(108,92,231,0.4);
        }

        .page-wrapper {
            position: relative;
            z-index: 1;
            padding: 6rem 2rem 2rem;
            max-width: 1000px;
            margin: 0 auto;
            min-height: 100vh;
        }

        .page-header {
            text-align: center;
            margin-bottom: 3rem;
            animation: fadeUp 0.8s ease;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .page-header .icon { font-size: 4rem; display: block; margin-bottom: 0.5rem; }
        .page-header h1 { font-size: 2.5rem; font-weight: 800; }
        .page-header .subtitle { color: var(--text-muted); font-size: 1rem; margin-top: 0.3rem; }

        .tutorial-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 1.5rem;
            margin-bottom: 3rem;
        }

        .card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 16px;
            padding: 2rem;
            text-align: center;
            transition: 0.3s;
            cursor: pointer;
            text-decoration: none;
            color: var(--text);
        }
        .card:hover {
            border-color: rgba(108,92,231,0.25);
            transform: translateY(-6px);
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .card .card-icon { font-size: 3rem; display: block; margin-bottom: 0.8rem; }
        .card h3 { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.3rem; }
        .card p { color: var(--text-light); font-size: 0.9rem; line-height: 1.5; }
        .card .step { display: inline-block; margin-top: 1rem; padding: 0.2rem 1rem; border-radius: 50px; background: var(--gradient-primary); color: white; font-size: 0.75rem; font-weight: 600; }

        .detail-section {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 16px;
            padding: 2.5rem;
            margin-top: 2rem;
            display: none;
            animation: fadeUp 0.4s ease;
        }
        .detail-section.active { display: block; }

        .detail-section h2 { font-size: 1.8rem; margin-bottom: 1rem; }
        .detail-section .content { color: var(--text-light); line-height: 1.8; }
        .detail-section .content ul { padding-left: 1.5rem; margin: 1rem 0; }
        .detail-section .content ul li { margin-bottom: 0.5rem; }

        .video-wrapper {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            overflow: hidden;
            border-radius: 12px;
            margin: 1rem 0;
        }
        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            border-radius: 12px;
        }

        .step-image {
            max-width: 100%;
            border-radius: 12px;
            margin: 0.5rem 0;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .code-block {
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 10px;
            padding: 1.5rem;
            font-family: 'Courier New', monospace;
            font-size: 0.85rem;
            overflow-x: auto;
            margin: 1rem 0;
            color: var(--text-light);
        }
        .code-block .comment { color: var(--text-muted); }
        .code-block .keyword { color: var(--primary); }
        .code-block .string { color: var(--secondary); }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.6rem;
            padding: 0.7rem 2rem;
            border-radius: 50px;
            font-size: 0.9rem;
            font-weight: 600;
            text-decoration: none;
            transition: 0.3s;
            border: none;
            cursor: pointer;
        }

        .btn-primary {
            background: var(--gradient-primary);
            color: white;
            box-shadow: 0 4px 25px rgba(108,92,231,0.3);
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 40px rgba(108,92,231,0.5);
        }

        .btn-secondary {
            background: rgba(255,255,255,0.05);
            color: var(--text-light);
            border: 1px solid rgba(255,255,255,0.08);
        }
        .btn-secondary:hover {
            background: rgba(255,255,255,0.1);
            color: white;
            transform: translateY(-2px);
        }

        .btn-back { margin-top: 1.5rem; }

        .empty-state {
            text-align: center;
            padding: 3rem;
            color: var(--text-muted);
        }
        .empty-state .icon { font-size: 3rem; display: block; margin-bottom: 0.5rem; }

        .loading {
            text-align: center;
            padding: 2rem;
            color: var(--text-muted);
        }

        @media (max-width: 768px) {
            .navbar { padding: 0.8rem 1rem; }
            .nav-links { gap: 0.8rem; }
            .nav-link { font-size: 0.8rem; }
            .nav-btn { padding: 0.4rem 1rem; font-size: 0.8rem; }
            .page-wrapper { padding: 5rem 1rem 1rem; }
            .page-header h1 { font-size: 1.8rem; }
            .tutorial-grid { grid-template-columns: 1fr; }
            .detail-section { padding: 1.5rem; }
        }
    </style>
</head>
<body>
    <div class="bg">
        <div class="bg-gradient"></div>
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
        <div class="bg-grid"></div>
        <div class="stars" id="stars"></div>
    </div>

    <nav class="navbar">
        <a href="/" class="nav-logo">🧶 Dika<span class="highlight">Knit</span></a>
        <div class="nav-links">
            <a href="/" class="nav-link">Главная</a>
            <a href="/dashboard.html" class="nav-link">Кабинет</a>
            <a href="/tutorial.html" class="nav-link active">Обучение</a>
            <a href="/updates.html" class="nav-link">Обновления</a>
            <a href="/login.html" class="nav-link nav-btn" id="authBtn">Войти</a>
        </div>
    </nav>

    <div class="page-wrapper">
        <div class="page-header">
            <span class="icon">📖</span>
            <h1>Обучение <span style="background: var(--gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">Dika Knit</span></h1>
            <p class="subtitle">Пошаговые инструкции для работы с платформой</p>
        </div>

        <div class="tutorial-grid" id="tutorialGrid">
            <div class="loading">⏳ Загрузка...</div>
        </div>

        <div id="detailContainer"></div>
    </div>

    <script>
        // ========================================
        // ЗВЕЗДЫ
        // ========================================
        (function() {
            const container = document.getElementById('stars');
            for (let i = 0; i < 80; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.animationDelay = Math.random() * 5 + 's';
                star.style.animationDuration = (2 + Math.random() * 3) + 's';
                star.style.width = (1 + Math.random() * 2) + 'px';
                star.style.height = star.style.width;
                container.appendChild(star);
            }
        })();

        // ========================================
        // ЗАГРУЗКА ТУТОРИАЛА
        // ========================================
        let tutorialData = [];

        async function loadTutorial() {
            try {
                const response = await fetch('/api/tutorial');
                const data = await response.json();
                tutorialData = data.sections || [];
                renderTutorial(tutorialData);
            } catch (error) {
                console.error('Ошибка загрузки туториала:', error);
                document.getElementById('tutorialGrid').innerHTML = `
                    <div class="empty-state">
                        <span class="icon">❌</span>
                        <p>Ошибка загрузки туториала</p>
                    </div>
                `;
            }
        }

        function renderTutorial(sections) {
            const grid = document.getElementById('tutorialGrid');
            
            if (!sections || sections.length === 0) {
                grid.innerHTML = `
                    <div class="empty-state">
                        <span class="icon">📖</span>
                        <p>Разделы туториала пока не добавлены</p>
                    </div>
                `;
                return;
            }

            grid.innerHTML = sections.map((section, index) => `
                <div class="card" onclick="showStep('${section.id}')">
                    <span class="card-icon">${section.icon || '📌'}</span>
                    <h3>${section.title}</h3>
                    <p>${section.content ? section.content.substring(0, 80) + '...' : 'Нет описания'}</p>
                    <span class="step">Шаг ${index + 1}</span>
                </div>
            `).join('');

            // Показываем первый раздел по умолчанию
            if (sections.length > 0) {
                showStep(sections[0].id);
            }
        }

        // ========================================
        // ПОКАЗ РАЗДЕЛА
        // ========================================
        function showStep(sectionId) {
            const container = document.getElementById('detailContainer');
            const section = tutorialData.find(s => s.id === sectionId);
            
            if (!section) {
                container.innerHTML = `<div class="empty-state"><span class="icon">❌</span><p>Раздел не найден</p></div>`;
                return;
            }

            let stepsHtml = '';
            if (section.steps && section.steps.length > 0) {
                stepsHtml = section.steps.map(step => `
                    <div style="margin-top: 1.5rem; padding: 1rem; background: rgba(255,255,255,0.02); border-radius: 12px; border: 1px solid rgba(255,255,255,0.05);">
                        <h4 style="color: var(--text); font-size: 1.1rem;">${step.title}</h4>
                        ${step.description ? `<p style="color: var(--text-light); margin-top: 0.3rem;">${step.description}</p>` : ''}
                        ${step.video ? `
                            <div class="video-wrapper">
                                <iframe src="${step.video}" allowfullscreen loading="lazy"></iframe>
                            </div>
                        ` : ''}
                        ${step.image ? `<img src="${step.image}" alt="${step.title}" class="step-image">` : ''}
                    </div>
                `).join('');
            }

            container.innerHTML = `
                <div class="detail-section active" id="detail-${section.id}">
                    <h2>${section.icon || '📌'} ${section.title}</h2>
                    <div class="content">
                        ${section.content ? `<p>${section.content}</p>` : ''}
                        ${section.video ? `
                            <div class="video-wrapper">
                                <iframe src="${section.video}" allowfullscreen loading="lazy"></iframe>
                            </div>
                        ` : ''}
                        ${stepsHtml}
                        <button class="btn btn-secondary btn-back" onclick="document.getElementById('detailContainer').scrollIntoView({ behavior: 'smooth', block: 'start' });">↑ Наверх</button>
                    </div>
                </div>
            `;

            // Прокрутка к деталям
            container.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        // ========================================
        // ПРОВЕРКА АВТОРИЗАЦИИ
        // ========================================
        async function checkAuth() {
            try {
                const response = await fetch('/api/check-session');
                const data = await response.json();
                const authBtn = document.getElementById('authBtn');
                if (data.authenticated) {
                    authBtn.textContent = `👤 ${data.user.username}`;
                    authBtn.href = '/dashboard.html';
                }
            } catch (error) {}
        }
        checkAuth();

        // ========================================
        // ЗАГРУЗКА
        // ========================================
        document.addEventListener('DOMContentLoaded', loadTutorial);
    </script>
</body>
</html>

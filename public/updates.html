<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Обновления - Dika Knit</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --primary: #6c5ce7;
            --secondary: #00b894;
            --dark: #0a0a1a;
            --text: #ffffff;
            --text-light: rgba(255,255,255,0.6);
            --text-muted: rgba(255,255,255,0.3);
            --glass: rgba(255,255,255,0.03);
            --glass-border: rgba(255,255,255,0.06);
            --gradient: linear-gradient(135deg, #6c5ce7, #a29bfe, #fd79a8);
            --gradient-primary: linear-gradient(135deg, #6c5ce7, #a29bfe);
        }

        html, body {
            min-height: 100vh;
            font-family: 'Inter', sans-serif;
            background: var(--dark);
            color: var(--text);
        }

        .bg {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            z-index: 0;
            background: var(--dark);
            overflow: hidden;
        }

        .bg-gradient {
            position: absolute;
            width: 100%; height: 100%;
            background: 
                radial-gradient(ellipse at 20% 50%, rgba(108,92,231,0.12) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 50%, rgba(0,184,148,0.08) 0%, transparent 60%),
                radial-gradient(ellipse at 50% 80%, rgba(253,121,168,0.06) 0%, transparent 50%);
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.3;
            animation: orbFloat 20s ease-in-out infinite alternate;
        }
        .orb-1 { width: 600px; height: 600px; background: rgba(108,92,231,0.15); top: -200px; left: -200px; }
        .orb-2 { width: 500px; height: 500px; background: rgba(0,184,148,0.10); bottom: -150px; right: -150px; animation-delay: -7s; }
        .orb-3 { width: 400px; height: 400px; background: rgba(253,121,168,0.08); top: 50%; left: 50%; transform: translate(-50%,-50%); animation-delay: -14s; }

        @keyframes orbFloat {
            0% { transform: translate(0,0) scale(1); }
            33% { transform: translate(60px,-40px) scale(1.1); }
            66% { transform: translate(-40px,30px) scale(0.9); }
            100% { transform: translate(30px,-20px) scale(1.05); }
        }

        .bg-grid {
            position: absolute;
            width: 100%; height: 100%;
            background-image: 
                linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
            background-size: 80px 80px;
            opacity: 0.5;
        }

        .stars {
            position: absolute;
            width: 100%; height: 100%;
        }
        .star {
            position: absolute;
            width: 2px; height: 2px;
            background: white;
            border-radius: 50%;
            animation: starTwinkle 3s ease-in-out infinite alternate;
        }
        @keyframes starTwinkle {
            0% { opacity: 0.2; transform: scale(0.8); }
            100% { opacity: 1; transform: scale(1.2); }
        }

        .navbar {
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 100;
            padding: 1rem 2.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(10,10,26,0.6);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .nav-logo {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            font-size: 1.2rem;
            font-weight: 700;
            color: white;
            text-decoration: none;
        }
        .nav-logo .highlight {
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }

        .nav-link {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            transition: 0.3s;
            position: relative;
        }
        .nav-link::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--gradient);
            transition: width 0.3s;
            border-radius: 2px;
        }
        .nav-link:hover { color: white; }
        .nav-link:hover::after { width: 100%; }
        .nav-link.active { color: white; }
        .nav-link.active::after { width: 100%; }

        .nav-btn {
            padding: 0.5rem 1.8rem;
            border-radius: 50px;
            background: var(--gradient-primary);
            color: white !important;
            font-weight: 600;
            box-shadow: 0 4px 20px rgba(108,92,231,0.25);
            transition: 0.3s;
        }
        .nav-btn::after { display: none; }
        .nav-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(108,92,231,0.4);
        }

        .page-wrapper {
            position: relative;
            z-index: 1;
            padding: 6rem 2rem 2rem;
            max-width: 1000px;
            margin: 0 auto;
            min-height: 100vh;
        }

        .page-header {
            text-align: center;
            margin-bottom: 3rem;
            animation: fadeUp 0.8s ease;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .page-header .icon { font-size: 4rem; display: block; margin-bottom: 0.5rem; }
        .page-header h1 { font-size: 2.5rem; font-weight: 800; }
        .page-header .subtitle { color: var(--text-muted); font-size: 1rem; margin-top: 0.3rem; }

        .timeline {
            position: relative;
            padding-left: 3rem;
        }
        .timeline::before {
            content: '';
            position: absolute;
            left: 8px;
            top: 0; bottom: 0;
            width: 2px;
            background: var(--gradient);
        }

        .update-item {
            position: relative;
            margin-bottom: 2.5rem;
            padding: 1.8rem;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 16px;
            transition: 0.3s;
        }
        .update-item:hover {
            border-color: rgba(108,92,231,0.2);
            transform: translateX(6px);
        }
        .update-item::before {
            content: '';
            position: absolute;
            left: -2.5rem;
            top: 2rem;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: var(--gradient-primary);
            border: 3px solid var(--dark);
            box-shadow: 0 0 20px rgba(108,92,231,0.3);
        }

        .update-item .version {
            display: inline-block;
            padding: 0.2rem 1rem;
            border-radius: 50px;
            background: var(--gradient-primary);
            color: white;
            font-weight: 700;
            font-size: 0.8rem;
        }
        .update-item .date {
            color: var(--text-muted);
            font-size: 0.85rem;
            margin-left: 0.5rem;
        }
        .update-item h3 { font-size: 1.3rem; margin: 0.5rem 0; }
        .update-item .content-text { color: var(--text-light); line-height: 1.6; margin: 0.5rem 0; }
        .update-item ul { list-style: none; padding: 0; }
        .update-item ul li {
            padding: 0.4rem 0;
            padding-left: 1.8rem;
            position: relative;
            color: var(--text-light);
            line-height: 1.5;
        }
        .update-item ul li::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0.7rem;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--secondary);
        }
        .update-item ul li.feature::before { background: var(--primary); }
        .update-item ul li.fix::before { background: #fdcb6e; }
        .update-item ul li.security::before { background: #ff6b6b; }

        .empty-state {
            text-align: center;
            padding: 3rem;
            color: var(--text-muted);
        }
        .empty-state .icon { font-size: 3rem; display: block; margin-bottom: 0.5rem; }

        .loading {
            text-align: center;
            padding: 2rem;
            color: var(--text-muted);
        }

        @media (max-width: 768px) {
            .navbar { padding: 0.8rem 1rem; }
            .nav-links { gap: 0.8rem; }
            .nav-link { font-size: 0.8rem; }
            .nav-btn { padding: 0.4rem 1rem; font-size: 0.8rem; }
            .page-wrapper { padding: 5rem 1rem 1rem; }
            .page-header h1 { font-size: 1.8rem; }
            .timeline { padding-left: 2rem; }
            .update-item::before { left: -1.5rem; width: 12px; height: 12px; }
        }
    </style>
</head>
<body>
    <div class="bg">
        <div class="bg-gradient"></div>
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
        <div class="bg-grid"></div>
        <div class="stars" id="stars"></div>
    </div>

    <nav class="navbar">
        <a href="/" class="nav-logo">🧶 Dika<span class="highlight">Knit</span></a>
        <div class="nav-links">
            <a href="/" class="nav-link">Главная</a>
            <a href="/dashboard.html" class="nav-link">Кабинет</a>
            <a href="/tutorial.html" class="nav-link">Обучение</a>
            <a href="/updates.html" class="nav-link active">Обновления</a>
            <a href="/login.html" class="nav-link nav-btn" id="authBtn">Войти</a>
        </div>
    </nav>

    <div class="page-wrapper">
        <div class="page-header">
            <span class="icon">🔄</span>
            <h1>История <span style="background: var(--gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">обновлений</span></h1>
            <p class="subtitle">Все последние изменения и улучшения Dika Knit</p>
        </div>

        <div class="timeline" id="updatesList">
            <div class="loading">⏳ Загрузка...</div>
        </div>
    </div>

    <script>
        // ========================================
        // ЗВЕЗДЫ
        // ========================================
        (function() {
            const container = document.getElementById('stars');
            for (let i = 0; i < 80; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.animationDelay = Math.random() * 5 + 's';
                star.style.animationDuration = (2 + Math.random() * 3) + 's';
                star.style.width = (1 + Math.random() * 2) + 'px';
                star.style.height = star.style.width;
                container.appendChild(star);
            }
        })();

        // ========================================
        // ЗАГРУЗКА ОБНОВЛЕНИЙ
        // ========================================
        async function loadUpdates() {
            try {
                const response = await fetch('/api/updates');
                const data = await response.json();
                renderUpdates(data.updates || []);
            } catch (error) {
                console.error('Ошибка загрузки обновлений:', error);
                document.getElementById('updatesList').innerHTML = `
                    <div class="empty-state">
                        <span class="icon">❌</span>
                        <p>Ошибка загрузки обновлений</p>
                    </div>
                `;
            }
        }

        function renderUpdates(updates) {
            const container = document.getElementById('updatesList');

            if (!updates || updates.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <span class="icon">🔄</span>
                        <p>Обновлений пока нет</p>
                    </div>
                `;
                return;
            }

            // Сортируем по дате (сначала новые)
            const sorted = [...updates].sort((a, b) => new Date(b.date) - new Date(a.date));

            container.innerHTML = sorted.map(update => {
                let featuresHtml = '';
                if (update.features && update.features.length > 0) {
                    featuresHtml = `<ul>${update.features.map(f => `<li>${f}</li>`).join('')}</ul>`;
                }

                return `
                    <div class="update-item">
                        <span class="version">${update.version}</span>
                        <span class="date">${update.date}</span>
                        <h3>${update.title}</h3>
                        ${update.content ? `<div class="content-text">${update.content}</div>` : ''}
                        ${featuresHtml}
                    </div>
                `;
            }).join('');
        }

        // ========================================
        // ПРОВЕРКА АВТОРИЗАЦИИ
        // ========================================
        async function checkAuth() {
            try {
                const response = await fetch('/api/check-session');
                const data = await response.json();
                const authBtn = document.getElementById('authBtn');
                if (data.authenticated) {
                    authBtn.textContent = `👤 ${data.user.username}`;
                    authBtn.href = '/dashboard.html';
                }
            } catch (error) {}
        }
        checkAuth();

        // ========================================
        // ЗАГРУЗКА
        // ========================================
        document.addEventListener('DOMContentLoaded', loadUpdates);
    </script>
</body>
</html>
